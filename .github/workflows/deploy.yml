name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (e.g. Stage East, Prod West)'
        required: true
        type: string
      packageVersion:
        description: 'Package / build version to deploy'
        required: true
        type: string

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dummy deploy (3 min)
        run: |
          echo "Deploy started for branch ${{ github.ref_name }}"
          echo "Repository      : ${{ github.repository }}"
          echo "Environment     : ${{ github.event.inputs.environment }}"
          echo "Package version : ${{ github.event.inputs.packageVersion }}"
          sleep 180
          echo "Deploy completed"
